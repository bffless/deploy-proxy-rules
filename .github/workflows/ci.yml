name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Verify dist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm build

      - name: Check dist is up to date
        run: |
          git add -A dist/
          if ! git diff --cached --quiet dist/; then
            echo "::error::dist/ is out of date (or has untracked/removed files). Run 'pnpm build' and commit dist/."
            git status --porcelain dist/
            exit 1
          fi
